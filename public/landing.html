<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPTG Home</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="app-page">

<div class="header">

    <div class="logo">
        ✈️ SPTG Rangsit
    </div>

    <button class="menu-btn" type="button" onclick="toggleSidebar()">
        ☰ Menu
    </button>

    <div class="user-info">
        👤 <span id="username">admin</span>
    </div>

</div>

<div class="container">

    <div class="sidebar">

        <h3>🧭 Navigation</h3>

        <a href="/home">
            🏠 Home
        </a>

        <a href="/upload">
            📄 Upload Files
        </a>

        <a href="/files">
            📥 Download Files
        </a>

        <a href="/record">
            📝 Record
        </a>

        <a href="/record-report">
            📊 Score Report
        </a>

        <a href="/leaderboard">
            🏆 Leaderboard
        </a>

        <a href="/admin" class="admin-link">
            🛠 Admin
        </a>

    </div>

    <div class="sidebar-overlay" onclick="closeSidebar()"></div>

    <div class="content">

        <div class="dashboard-card">

            <h2>
                🏠 Welcome to SPTG Rangsit
            </h2>

            <p>
                Smart Process Testing Gateway
            </p>

            <hr>

            <h3>⚡ Quick Actions</h3>

            <div class="action-buttons">

                <a href="/upload" class="action-btn">
                    📄 Upload PDF
                </a>

                <a href="/files" class="action-btn">
                    📥 View Files
                </a>

            </div>

        </div>

    </div>

</div>

<script src="/sidebar.js"></script>
<script>
const username =
    localStorage.getItem("username") || "Guest";

document.getElementById("username")
    .innerText = username;

if (username === "admin") {
    document
        .querySelectorAll(".admin-link")
        .forEach(link => {
            link.style.display = "block";
        });
}
</script>

</body>
</html>
