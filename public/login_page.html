<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SPTG</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="auth-page">

<div class="page">

    <div class="login-card">

        <div class="logo">
            ✈️
        </div>

        <h1>✈️ Welcome SPTG Rangsit</h1>

        <p class="subtitle">
            🔐 Smart Process Testing Gateway
        </p>

        <form id="loginForm">
    <input
        type="text"
        id="username"
        placeholder="Username"
        required>

    <input
        type="password"
        id="password"
        placeholder="Password"
        required>

    <button type="submit">
        🔐 Login
    </button>

    <a href="/register" class="register-btn">
    ✨ Create Account
</a>
</form>

    </div>

</div>

<script>
document
.getElementById("loginForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    const response = await fetch(
        "/api/login",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username,
                password
            })
        }
    );

    const result = await response.json();

    if(result.success){

        localStorage.setItem(
            "username",
            result.username
        );

        window.location.href =
            "/home";

    }else{

        alert(
            result.message ||
            "Login Failed"
        );

    }

});
</script>

</body>
</html>
