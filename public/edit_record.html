<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Record - SPTG</title>

<link rel="stylesheet" href="/style.css">

</head>

<body class="app-page">

<div class="header">
    <div class="logo">
        ✈️ SPTG Rangsit
    </div>

    <button class="menu-btn" type="button" onclick="toggleSidebar()">
        ☰ Menu
    </button>

    <div class="user-info">
        👤 <span id="username"></span>
    </div>
</div>

<div class="container">

    <div class="sidebar">

        <h3>🧭 Navigation</h3>

        <a href="/home">
            🏠 Home
        </a>

        <a href="/upload">
            📄 Upload Files
        </a>

        <a href="/files">
            📥 Download Files
        </a>

        <a href="/record">
            📝 Record
        </a>

        <a href="/record-report">
            📊 Score Report
        </a>

        <a href="/leaderboard">
            🏆 Leaderboard
        </a>

        <a href="/admin" class="admin-link">
            🛠 Admin
        </a>

    </div>

    <div class="sidebar-overlay" onclick="closeSidebar()"></div>

    <div class="content">

        <div class="admin-card">
            <h2 class="page-title">
                ✏️ Edit Score Records
            </h2>

            <p class="subtitle">
                Search your tested date range, then edit multiple rows before saving.
            </p>

            <div class="filter-bar">
                <div class="filter-field">
                    <label for="startDate">Start Date</label>
                    <input id="startDate" type="date" required>
                </div>

                <div class="filter-field">
                    <label for="endDate">End Date</label>
                    <input id="endDate" type="date" required>
                </div>

                <button class="search-btn" type="button" onclick="loadRecords()">
                    🔍 Search
                </button>
            </div>

            <div class="edit-actions">
                <button class="submit-btn" type="button" onclick="saveRecords()">
                    💾 Save All Changes
                </button>

                <a class="preview-btn" href="/record-report">
                    ← Back to Report
                </a>
            </div>

            <div id="editMessage" class="edit-message"></div>
            <div id="recordContainer" class="table-wrap">
                <div class="empty">Select filters, then click Search</div>
            </div>
        </div>

    </div>

</div>

<script src="/sidebar.js"></script>
<script>
const currentUsername =
    localStorage.getItem("username") || "Guest";

document.getElementById("username").innerText =
    currentUsername;

let currentRows = [];

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function inputValue(value) {
    return escapeHtml(value ?? "");
}

function dateValue(value) {
    return String(value || "").slice(0, 10);
}

function dateTimeValue(value) {
    if (!value) {
        return "";
    }

    return String(value)
        .replace(" ", "T")
        .slice(0, 16);
}

function setDefaultDates() {
    const today =
        new Date().toISOString().slice(0, 10);

    document.getElementById("startDate").value =
        today;
    document.getElementById("endDate").value =
        today;
}

function setMessage(message, type = "info") {
    const messageBox =
        document.getElementById("editMessage");

    messageBox.innerText =
        message;
    messageBox.className =
        `edit-message ${type}`;
}

function clearMessage() {
    setMessage("");
}

function rowInput(id, field) {
    return document.querySelector(
        `[data-row-id="${id}"][data-field="${field}"]`
    );
}

function readEditedRows() {
    return currentRows.map(row => ({
        id: row.id,
        skill_type: row.skill_type,
        test_name: row.test_name,
        tested_data: rowInput(row.id, "tested_data").value,
        testing_date: row.testing_date,
        correct_score: Number(rowInput(row.id, "correct_score").value || 0),
        attempt_score: Number(rowInput(row.id, "attempt_score").value || 0),
        total: rowInput(row.id, "total").value
    }));
}

function renderRecords(rows) {
    const container =
        document.getElementById("recordContainer");

    currentRows =
        rows;

    if (!Array.isArray(rows) || rows.length === 0) {
        container.innerHTML =
            `<div class="empty">No records found for this filter</div>`;
        return;
    }

    container.innerHTML = `
        <table class="edit-table">
            <thead>
                <tr>
                    <th>Skill Type</th>
                    <th>Test Name</th>
                    <th>Tested Date</th>
                    <th>Correct</th>
                    <th>Attempt</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                ${rows.map(row => `
                    <tr>
                        <td class="skill-name">${escapeHtml(row.skill_type)}</td>
                        <td class="test-name">${escapeHtml(row.test_name)}</td>
                        <td>
                            <input
                                data-row-id="${row.id}"
                                data-field="tested_data"
                                type="date"
                                value="${dateValue(row.tested_data)}">
                        </td>
                        <td>
                            <input
                                data-row-id="${row.id}"
                                data-field="correct_score"
                                type="number"
                                min="0"
                                value="${inputValue(row.correct_score)}">
                        </td>
                        <td>
                            <input
                                data-row-id="${row.id}"
                                data-field="attempt_score"
                                type="number"
                                min="0"
                                value="${inputValue(row.attempt_score)}">
                        </td>
                        <td>
                            <input
                                data-row-id="${row.id}"
                                data-field="total"
                                type="number"
                                min="0"
                                value="${inputValue(row.total)}">
                        </td>
                    </tr>
                `).join("")}
            </tbody>
        </table>
    `;
}

async function loadRecords() {
    const startDate =
        document.getElementById("startDate").value;
    const endDate =
        document.getElementById("endDate").value;

    if (!startDate || !endDate) {
        setMessage("Please fill start date and end date.", "error");
        return;
    }

    clearMessage();

    const params = new URLSearchParams({
        start_date: startDate,
        end_date: endDate
    });

    const response = await fetch(
        `/api/edit-record?${params.toString()}`
    );
    const rows = await response.json();

    if (!response.ok) {
        renderRecords([]);
        setMessage(rows.message || "Unable to load records.", "error");
        return;
    }

    renderRecords(rows);
    setMessage(`Loaded ${rows.length} record(s).`, "success");
}

async function saveRecords() {
    if (!currentRows.length) {
        setMessage("No records to save.", "error");
        return;
    }

    const rows =
        readEditedRows();

    const response = await fetch(
        "/api/edit-record",
        {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                rows
            })
        }
    );
    const result = await response.json();

    if (!response.ok || !result.success) {
        setMessage(result.message || "Save failed.", "error");
        return;
    }

    await loadRecords();
    setMessage(`Saved ${result.updated} record(s).`, "success");
    window.location.reload();
}

setDefaultDates();
</script>

</body>
</html>
